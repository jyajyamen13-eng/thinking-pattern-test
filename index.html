<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>思考パターン分析テスト</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ===== カスタムスタイル ===== */
    body {
      background-color: #f0f4f8;
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
    }

    /* オプションボタン */
    .option-btn {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .option-btn:hover {
      background-color: #eef2ff;
      border-color: #6366f1;
    }
    .option-btn.selected {
      background-color: #eef2ff;
      border-color: #4f46e5;
      color: #4f46e5;
    }
    .option-btn.selected .option-number {
      background-color: #4f46e5;
      color: white;
    }

    /* プログレスバー */
    .progress-bar-fill {
      transition: width 0.4s ease;
    }

    /* スコアバー */
    .score-bar {
      height: 8px;
      background-color: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 9999px;
      transition: width 1s ease;
    }

    /* 質問トランジション */
    .question-fade {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 印刷スタイル */
    @media print {
      body { background-color: white !important; }
      .no-print { display: none !important; }
      #test-section { display: none !important; }
      #result-section { display: block !important; }
      .print-card {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .chart-area {
        max-width: 400px;
        margin: 0 auto;
      }
      .print-header {
        text-align: center;
        margin-bottom: 1rem;
      }
    }

    /* ページ全体が結果表示時にスムーズにスクロール */
    html { scroll-behavior: smooth; }

    /* アドバイスエリア */
    .advice-box {
      border-left: 3px solid;
      padding: 0.5rem 0.75rem;
      border-radius: 0 4px 4px 0;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .advice-low  { border-color: #22c55e; background-color: #f0fdf4; color: #166534; }
    .advice-mid  { border-color: #eab308; background-color: #fefce8; color: #854d0e; }
    .advice-high { border-color: #ef4444; background-color: #fef2f2; color: #991b1b; }

    /* スコアバッジ */
    .score-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-low  { background: #dcfce7; color: #166534; }
    .badge-mid  { background: #fef9c3; color: #854d0e; }
    .badge-high { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body class="min-h-screen">

<!-- ===== テストセクション ===== -->
<section id="test-section" class="max-w-2xl mx-auto px-4 py-10">

  <!-- ヘッダー -->
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-indigo-800 mb-1">思考パターン分析テスト</h1>
    <p class="text-sm text-gray-500">あなたの思考傾向を15の視点から分析します。各質問に正直に答えてください。</p>
  </div>

  <!-- プログレスバー -->
  <div class="mb-6">
    <div class="flex justify-between text-xs text-gray-500 mb-1">
      <span id="q-counter">質問 1 / 45</span>
      <span id="q-percent">2%</span>
    </div>
    <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
      <div id="progress-bar" class="progress-bar-fill h-full bg-indigo-500 rounded-full" style="width:2%"></div>
    </div>
  </div>

  <!-- 質問カード -->
  <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
    <p id="question-text" class="text-base font-medium text-gray-800 mb-5 question-fade leading-relaxed"></p>
    <div id="options-container" class="space-y-2"></div>
  </div>

  <!-- ナビゲーション -->
  <div class="flex gap-3">
    <button id="prev-btn" class="no-print flex-1 py-2.5 rounded-xl border border-indigo-300 text-indigo-600 font-medium hover:bg-indigo-50 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>前へ</button>
    <button id="restart-test-btn" class="no-print py-2.5 px-4 rounded-xl border border-gray-300 text-gray-500 font-medium hover:bg-gray-50 transition text-sm">やり直し</button>
  </div>
</section>

<!-- ===== 結果セクション ===== -->
<section id="result-section" class="hidden max-w-3xl mx-auto px-4 py-10">

  <!-- 印刷ヘッダー（印刷時のみ表示） -->
  <div class="print-header hidden" id="print-title">
    <h1 style="font-size:1.4rem;font-weight:bold;color:#3730a3;">思考パターン分析テスト 結果レポート</h1>
    <p style="font-size:0.8rem;color:#6b7280;">作成日: <span id="result-date"></span></p>
    <hr style="margin:0.5rem 0;" />
  </div>

  <!-- 結果ヘッダー -->
  <div class="text-center mb-8 no-print">
    <h2 class="text-2xl font-bold text-indigo-800 mb-1">分析結果</h2>
    <p class="text-sm text-gray-500">15カテゴリの思考パターンをスコアで表示しています</p>
  </div>

  <!-- 総合コメント -->
  <div id="summary-comment" class="bg-indigo-50 border border-indigo-200 rounded-2xl p-5 mb-8 print-card">
    <h3 class="font-bold text-indigo-800 mb-2 text-base">あなたの思考傾向の特徴</h3>
    <div id="summary-text" class="text-sm text-gray-700 leading-relaxed space-y-1"></div>
  </div>

  <!-- レーダーチャート -->
  <div class="bg-white rounded-2xl shadow-md p-5 mb-8 print-card chart-area">
    <h3 class="font-bold text-gray-700 mb-4 text-center">思考パターン レーダーチャート</h3>
    <div style="max-width:480px;margin:0 auto;">
      <canvas id="radar-chart"></canvas>
    </div>
  </div>

  <!-- カテゴリ別詳細 -->
  <div id="results-by-category"></div>

  <!-- アクションボタン -->
  <div class="no-print flex flex-wrap gap-3 mt-8 justify-center">
    <button id="print-btn" class="py-2.5 px-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
      結果をPDFで保存
    </button>
    <button id="restart-btn" class="py-2.5 px-6 bg-white border border-indigo-300 text-indigo-600 hover:bg-indigo-50 rounded-xl font-medium transition">
      もう一度テストする
    </button>
  </div>
</section>

<script>

// データ定義
// ===========================

const thinkingPatterns = [

  { id: 33, text: '社会的なステレオタイプに基づいて人を判断することがある',                   patternId: 'discrimination' },

  { id: 35, text: '他者の承認や同意がないと不安になる',                                       patternId: 'dependency' },
  { id: 36, text: '一人でいることに強い不安を感じる',                                         patternId: 'dependency' },
  { id: 37, text: '新しい状況や環境の変化に適応するのが苦手だ',                               patternId: 'resistanceToChange' },
  { id: 38, text: '慣れた方法や習慣を変えることに抵抗を感じる',                               patternId: 'resistanceToChange' },
  { id: 39, text: '不確実な状況よりも、結果が予測できる状況を好む',                           patternId: 'resistanceToChange' },
  { id: 40, text: '自分の価値を他者と比較して判断することが多い',                             patternId: 'comparison' },
  { id: 41, text: 'SNSで他人の投稿を見ると、自分の生活と比べてしまう',                        patternId: 'comparison' },
  { id: 42, text: '他人の成功を聞くと、自分が劣っているように感じる',                         patternId: 'comparison' },
  { id: 43, text: '成功すると、それを維持できないのではと不安になる',                         patternId: 'fearOfSuccess' },
  { id: 44, text: '目標達成が近づくと、なぜか自己妨害的な行動をとってしまう',                 patternId: 'fearOfSuccess' },
  { id: 45, text: '成功すると周囲からの期待が高まり、それが怖いと感じる',                     patternId: 'fearOfSuccess' }

// ===========================
// アドバイスデータ（3段階 × 15カテゴリ）

const advice = {

// ===========================
// 状態管理
// ===========================
let state = {
  currentIndex: 0,
  answers: {},
  shuffled: [],
  results: null,
  chartInstance: null
};

// ===========================
// 初期化
// ===========================
function initTest() {
  state.shuffled = [...questions].sort(() => Math.random() - 0.5);
  state.currentIndex = 0;
  state.answers = {};
  state.results = null;

  document.getElementById('test-section').classList.remove('hidden');
  document.getElementById('result-section').classList.add('hidden');

  renderQuestion();
}

// ===========================
// 質問表示
// ===========================
function renderQuestion() {
  const q = state.shuffled[state.currentIndex];
  const num = state.currentIndex + 1;
  const total = state.shuffled.length;
  const pct = Math.round((num / total) * 100);

  document.getElementById('q-counter').textContent = `質問 ${num} / ${total}`;
  document.getElementById('q-percent').textContent = `${pct}%`;
  document.getElementById('progress-bar').style.width = `${pct}%`;

  const qText = document.getElementById('question-text');
  qText.textContent = q.text;
  qText.classList.remove('question-fade');
  void qText.offsetWidth; // reflow
  qText.classList.add('question-fade');

  const optCont = document.getElementById('options-container');
  optCont.innerHTML = '';

  const opts = [
    { v: 1, label: '全く当てはまらない' },
    { v: 2, label: 'ほとんど当てはまらない' },
    { v: 3, label: 'あまり当てはまらない' },
    { v: 4, label: 'やや当てはまる' },
    { v: 5, label: 'かなり当てはまる' },
    { v: 6, label: '非常に当てはまる' }
  ];

  opts.forEach(o => {
    const btn = document.createElement('button');
    const isSelected = state.answers[q.id] === o.v;
    btn.className = `option-btn w-full flex items-center gap-3 px-4 py-3 border rounded-xl text-left ${isSelected ? 'selected border-indigo-400' : 'border-gray-200 bg-white'}`;
    btn.innerHTML = `
      <span class="option-number flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-sm font-semibold
        ${isSelected ? 'bg-indigo-500 text-white' : 'bg-indigo-100 text-indigo-600'}">
        ${o.v}
      </span>
      <span class="text-sm text-gray-700">${o.label}</span>
    `;
    btn.addEventListener('click', () => selectAnswer(q.id, o.v));
    optCont.appendChild(btn);
  });

  document.getElementById('prev-btn').disabled = state.currentIndex === 0;
}

function selectAnswer(qId, value) {
  state.answers[qId] = value;

  // ボタンUIを更新
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    const isNow = (i === value - 1);
    btn.classList.toggle('selected', isNow);
    btn.classList.toggle('border-indigo-400', isNow);
    btn.classList.toggle('border-gray-200', !isNow);
    btn.classList.toggle('bg-white', !isNow);

    const numEl = btn.querySelector('.option-number');
    if (numEl) {
      numEl.className = `option-number flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-sm font-semibold ${isNow ? 'bg-indigo-500 text-white' : 'bg-indigo-100 text-indigo-600'}`;
    }
  });

  // 次の質問へ
  setTimeout(() => {
    if (state.currentIndex < state.shuffled.length - 1) {
      state.currentIndex++;
      renderQuestion();
    } else {
      showResults();
    }
  }, 280);
}

// ===========================
// 結果計算
// ===========================
function calcResults() {
  const res = {};
  thinkingPatterns.forEach(p => {
    res[p.id] = { ...p, total: 0, count: 0, score: 0 };
  });

  state.shuffled.forEach(q => {
    const a = state.answers[q.id];
    if (a) {
      res[q.patternId].total += a;
      res[q.patternId].count++;
    }
  });

  Object.keys(res).forEach(id => {
    if (res[id].count > 0) {
      res[id].score = parseFloat((res[id].total / res[id].count).toFixed(1));
    }
  });

  return res;
}

// ===========================
// 結果表示
// ===========================
function showResults() {
  state.results = calcResults();

  document.getElementById('test-section').classList.add('hidden');
  document.getElementById('result-section').classList.remove('hidden');

  // 結果日付
  const now = new Date();
  document.getElementById('result-date').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('print-title').classList.remove('hidden');

  renderSummary(state.results);
  renderRadarChart(state.results);
  renderCategoryResults(state.results);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===========================
// 総合コメント
// ===========================
function renderSummary(results) {
  const sorted = Object.values(results).sort((a, b) => b.score - a.score);
  const top3 = sorted.slice(0, 3);
  const low3 = sorted.filter(p => p.score <= 2).slice(0, 3);

  const container = document.getElementById('summary-text');
  container.innerHTML = '';

  // 上位3つ
  const top3Line = document.createElement('p');
  top3Line.innerHTML = `スコアが特に高い傾向として、<strong class="text-indigo-700">${top3.map(p => p.name).join('、')}</strong>が見られます。`;
  container.appendChild(top3Line);

  // 上位カテゴリへの簡単なコメント
  top3.forEach(p => {
    const line = document.createElement('p');
    const level = p.score <= 2 ? 'low' : p.score <= 4 ? 'mid' : 'high';
    const levelText = level === 'high' ? '強く見られます' : level === 'mid' ? '時々見られます' : 'あまり見られません';
    line.innerHTML = `・<strong>${p.name}</strong>（スコア ${p.score}）: ${levelText}`;
    container.appendChild(line);
  });

  // 強みコメント
  if (low3.length > 0) {
    const strengthLine = document.createElement('p');
    strengthLine.className = 'text-indigo-700 font-medium mt-2';
    strengthLine.innerHTML = `<strong>${low3.map(p => p.name).join('、')}</strong>の傾向が低いことは、あなたの大きな強みです。`;
    container.appendChild(strengthLine);
  } else {
    const allMid = document.createElement('p');
    allMid.className = 'text-indigo-700 font-medium mt-2';
    allMid.textContent = '全体的にバランスが取れています。気になるカテゴリのアドバイスを参考にしてみてください。';
    container.appendChild(allMid);
  }
}

// ===========================
// レーダーチャート
// ===========================
function renderRadarChart(results) {
  const ctx = document.getElementById('radar-chart').getContext('2d');

  if (state.chartInstance) {
    state.chartInstance.destroy();
  }

  const labels = thinkingPatterns.map(p => p.name);
  const data = thinkingPatterns.map(p => results[p.id].score);

  state.chartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        label: '思考パターンスコア',
        data,
        backgroundColor: 'rgba(79, 70, 229, 0.15)',
        borderColor: 'rgba(79, 70, 229, 0.8)',
        borderWidth: 2,
        pointBackgroundColor: 'rgba(79, 70, 229, 1)',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      scales: {
        r: {
          suggestedMin: 0,
          suggestedMax: 6,
          ticks: { stepSize: 1, font: { size: 10 } },
          pointLabels: { font: { size: 11 } }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

// ===========================
// カテゴリ別詳細
// ===========================
function renderCategoryResults(results) {
  const container = document.getElementById('results-by-category');
  container.innerHTML = '';

  const categories = {};
  thinkingPatterns.forEach(p => {
    if (!categories[p.category]) categories[p.category] = [];
    categories[p.category].push(p);
  });

  Object.entries(categories).forEach(([catName, patterns]) => {
    const section = document.createElement('div');
    section.className = 'mb-8 print-card';

    // カテゴリヘッダー
    const header = document.createElement('h3');
    header.className = 'text-base font-bold pl-3 border-l-4 border-indigo-500 text-indigo-800 mb-4';
    header.textContent = catName;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';

    patterns.forEach(p => {
      const r = results[p.id];
      const level = r.score <= 2 ? 'low' : r.score <= 4 ? 'mid' : 'high';
      const levelLabel = level === 'low' ? 'あまり見られない' : level === 'mid' ? '時々見られる' : '注意が必要';
      const badgeClass = `badge-${level}`;
      const adviceClass = `advice-${level}`;
      const adviceText = advice[p.id][level];
      const barPct = Math.round((r.score / 6) * 100);

      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-4 print-card';
      card.innerHTML = `
        <div class="flex items-start justify-between mb-1">
          <h4 class="font-bold text-gray-800 text-sm">${p.name}</h4>
          <span class="score-badge ${badgeClass} ml-2 flex-shrink-0">${levelLabel}</span>
        </div>
        <p class="text-xs text-gray-500 mb-3">${p.description}</p>
        <div class="score-bar mb-1">
          <div class="score-bar-fill" style="width:${barPct}%; background-color:${p.color};"></div>
        </div>
        <div class="flex justify-between text-xs text-gray-500 mb-3">
          <span>スコア</span>
          <span class="font-semibold">${r.score} / 6</span>
        </div>
        <div class="advice-box ${adviceClass}">
          ${adviceText}
        </div>
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

// ===========================
// イベントリスナー
// ===========================
document.getElementById('prev-btn').addEventListener('click', () => {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    renderQuestion();
  }
});

document.getElementById('restart-test-btn').addEventListener('click', initTest);
document.getElementById('restart-btn').addEventListener('click', initTest);

document.getElementById('print-btn').addEventListener('click', () => {
  window.print();
});

// ===========================
// 起動
// ===========================
initTest();
</script>
